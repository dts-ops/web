<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Private Chat</title>
	<link rel="stylesheet" href="/chat/css/style.css">
	<script>
		(function() {
			// 1. Lấy token từ bộ nhớ LocalStorage ra xem có không
			const token = localStorage.getItem("chat_token");
			const role = localStorage.getItem("chat_my_role");

			// 2. Nếu không có token hoặc không có vai trò (chưa đăng nhập)
			if (!token || !role) {
				// Đá người dùng về trang login ngay lập tức
				window.location.replace("/chat/login.html");
				return;
			}

			// 3. Check xem JWT có bị hết hạn hay không
			try {
				const base64Url = token.split('.')[1];
				const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
				const payload = JSON.parse(window.atob(base64));
				
				const now = Math.floor(Date.now() / 1000);
				
				if (payload.exp && now >= payload.exp) {
					alert("🔒 Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại!");
					localStorage.clear();
					window.location.replace("login.html");
				}
			} catch (e) {
				localStorage.clear();
				window.location.replace("login.html");
			}
		})();
	</script>
	<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>
	<div class="container">
		<div class="chat">
			
			<div class="chat-header">
				<div class="profile">
					<div class="left">
						<img src="/chat/img/pp.png" class="pp" alt="">
						<div class="left-text">
							<h2>Users</h2>
							<span id="connection-status" class="status-e2ee"></span>
						</div>
					</div>

					<div class="right">
						<div class="dropdown">
							<img src="/chat/img/more.png" class="icon dropdown-toggle" alt="More Options" id="dropdownBtn">
							
							<div class="dropdown-menu" id="dropdownMenu">
								<a href="#" class="dropdown-item" id="pushNotifyBtn">
									<img src="/chat/img/bell.png" alt="" class="menu-icon"> Bật thông báo đẩy
								</a>
								<a href="#" class="dropdown-item" id="logoutBtn">
									<img src="/chat/img/logout.png" alt="" class="menu-icon"> Đăng xuất
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="chat-box" id="chatBoxContainer">
				<div id="first-load-screen">
					<div class="main-spinner"></div>
					<p>Đang tải tin nhắn...</p>
				</div>
				</div>

			<div class="chat-footer">
				<img src="/chat/img/emo.png" class="emo" alt="Emoji">
				<textarea id="inputPostText" placeholder="Type a message"></textarea>
				<div class="icons">
					<img src="/chat/img/attach file.png" alt="Attach">
					<img src="/chat/img/camera.png" alt="Camera">
				</div>
				<img id="micPost" src="/chat/img/mic.png" class="mic" alt="Microphone">
				<img id="textSubmit" src="/chat/img/send.png" class="send-btn disNone" alt="Send">
			</div>

		</div>
	</div>

	<div id="maintenance-screen" style="
		display: none !important; 
		position: fixed; 
		top: 0; left: 0; 
		width: 100%; height: 100%; 
		background: #1a1a2e; 
		color: #fff; 
		z-index: 999999; 
		flex-direction: column; 
		justify-content: center; 
		align-items: center; 
		font-family: sans-serif;
		text-align: center;
		padding: 20px;
	">
		<h1 style="font-size: 3rem; margin-bottom: 10px;">⚙️ Hệ Thống Bảo Trì</h1>
		<p style="font-size: 1.2rem; color: #a0a0c0; max-width: 500px;">
			Máy chủ đang được nâng cấp. Khổ quá mất có tí thời gian thôi!
		</p>
		<div style="
			margin-top: 20px; 
			width: 40px; height: 40px; 
			border: 4px solid #3498db; 
			border-top: 4px solid transparent; 
			border-radius: 50%; 
			animation: spin 1s linear infinite;
		"></div>
	</div>
	
	<style>
		@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
	</style>

	<script src="/chat/js/script.js" defer></script>
</body>
</html>
